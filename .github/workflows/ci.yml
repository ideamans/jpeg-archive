name: CI Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [x64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache mozjpeg
        id: cache-mozjpeg
        uses: actions/cache@v4
        with:
          path: /opt/mozjpeg
          key: ${{ runner.os }}-mozjpeg-v4.1.5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake nasm libpng-dev

      - name: Build mozjpeg
        if: steps.cache-mozjpeg.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/mozilla/mozjpeg.git
          cd mozjpeg
          git checkout v4.1.5
          mkdir build && cd build
          cmake -G"Unix Makefiles" -DCMAKE_INSTALL_PREFIX=/opt/mozjpeg ..
          make -j$(nproc)
          sudo make install

      - name: Build
        run: |
          make clean
          make all
          make libjpegarchive.a

      - name: Run tests
        run: |
          make test
          make test-lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.platform }}-binaries
          path: |
            jpeg-recompress
            jpeg-compare
            jpeg-hash
            libjpegarchive.a

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        platform: [x64, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/cmake@3
            /usr/local/Cellar/nasm
            /opt/homebrew/Cellar/libpng
            /usr/local/Cellar/libpng
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/.macos/cmake.rb') }}-v2
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Cache mozjpeg
        id: cache-mozjpeg
        uses: actions/cache@v4
        with:
          path: /usr/local/opt/mozjpeg
          key: ${{ runner.os }}-${{ matrix.platform }}-mozjpeg-v4.1.5

      - name: Install dependencies
        run: |
          # Update Homebrew and upgrade libpng if needed
          brew update
          brew upgrade libpng || true
          # Install cmake@3 from custom formula (use full path)
          brew install ${GITHUB_WORKSPACE}/.github/.macos/cmake.rb || true
          brew install nasm || true
          # Ensure we have libpng >= 1.6
          brew list libpng || brew install libpng

      - name: Build mozjpeg
        if: steps.cache-mozjpeg.outputs.cache-hit != 'true'
        run: |
          # Install mozjpeg
          git clone https://github.com/mozilla/mozjpeg.git
          cd mozjpeg
          git checkout v4.1.5
          mkdir build && cd build
          if [ "${{ matrix.platform }}" = "arm64" ]; then
            cmake -G"Unix Makefiles" -DCMAKE_INSTALL_PREFIX=/usr/local/opt/mozjpeg -DCMAKE_OSX_ARCHITECTURES=arm64 ..
          else
            cmake -G"Unix Makefiles" -DCMAKE_INSTALL_PREFIX=/usr/local/opt/mozjpeg -DCMAKE_OSX_ARCHITECTURES=x86_64 ..
          fi
          make -j$(sysctl -n hw.ncpu)
          sudo make install

      - name: Build
        run: |
          make clean
          make all
          make libjpegarchive.a

      - name: Run tests
        run: |
          make test
          make test-lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.platform }}-binaries
          path: |
            jpeg-recompress
            jpeg-compare
            jpeg-hash
            libjpegarchive.a

  test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-go
            mingw-w64-x86_64-libpng
            git
            unzip
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache CMake
        id: cache-cmake
        uses: actions/cache@v4
        with:
          path: /usr/local/cmake
          key: ${{ runner.os }}-cmake-3.30.5

      - name: Install cmake version 3
        if: steps.cache-cmake.outputs.cache-hit != 'true'
        run: |
          # Remove any existing cmake package
          pacman -R --noconfirm mingw-w64-x86_64-cmake || true
          # Download and install cmake 3.30.5 (latest version 3.x)
          curl -L https://github.com/Kitware/CMake/releases/download/v3.30.5/cmake-3.30.5-windows-x86_64.zip -o cmake.zip
          unzip -q cmake.zip
          # Move cmake to a permanent location
          mkdir -p /usr/local
          mv cmake-3.30.5-windows-x86_64 /usr/local/cmake

      - name: Setup cmake PATH
        run: |
          # Add cmake to PATH
          echo 'export PATH="/usr/local/cmake/bin:$PATH"' >> ~/.bashrc
          export PATH="/usr/local/cmake/bin:$PATH"
          # Verify cmake version
          cmake --version

      - name: Cache mozjpeg
        id: cache-mozjpeg
        uses: actions/cache@v4
        with:
          path: ../mozjpeg
          key: ${{ runner.os }}-mozjpeg-v4.1.5-built

      - name: Build mozjpeg
        if: steps.cache-mozjpeg.outputs.cache-hit != 'true'
        run: |
          export PATH="/usr/local/cmake/bin:$PATH"
          git clone https://github.com/mozilla/mozjpeg.git ../mozjpeg
          cd ../mozjpeg
          git checkout v4.1.5
          mkdir build && cd build
          cmake -G"MSYS Makefiles" -DCMAKE_INSTALL_PREFIX=../install ..
          make -j$(nproc)
          make install
          # Create static library in expected location
          cp ../install/lib/libjpeg.a ../libjpeg.a

      - name: Setup mozjpeg includes
        run: |
          # Copy jconfig.h and other generated headers to source directory
          if [ -f ../mozjpeg/build/jconfig.h ]; then
            cp ../mozjpeg/build/jconfig.h ../mozjpeg/
          fi
          if [ -f ../mozjpeg/install/include/jconfig.h ]; then
            cp ../mozjpeg/install/include/jconfig.h ../mozjpeg/
          fi

      - name: Build
        run: |
          export PATH="/usr/local/cmake/bin:$PATH"
          make clean
          make all
          make libjpegarchive.a

      - name: Run tests
        run: |
          export PATH="/usr/local/cmake/bin:$PATH"
          make test
          make test-lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-binaries
          path: |
            jpeg-recompress.exe
            jpeg-compare.exe
            jpeg-hash.exe
            libjpegarchive.a

  release:
    needs: [test-linux, test-macos, test-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          # Create versioned archives for each platform
          for platform in linux-x64 macos-x64 macos-arm64 windows-x64; do
            if [ -d "${platform}-binaries" ]; then
              tar czf "jpeg-archive-${{ steps.get_version.outputs.VERSION }}-${platform}.tar.gz" -C "${platform}-binaries" .
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: JPEG Archive ${{ steps.get_version.outputs.VERSION }}
          files: |
            jpeg-archive-${{ steps.get_version.outputs.VERSION }}-*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
